version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - neuraleye_data:/data
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - REDIS_URL=redis://redis:6379
      - DB_PATH=/data/neuraleye.db
      - POS_CSV_PATH=/app/data/pos_transactions.csv
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]

  dashboard:
    build:
      context: dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  neuraleye_data:
